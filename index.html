<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Wiki Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@300;400;600&display=swap');
        body { font-family: 'Libre+Franklin', sans-serif; background-color: #f6f6f6; }
        .wiki-content { line-height: 1.6; color: #202122; }
        .wiki-content a { color: #3366cc; text-decoration: none; }
        .wiki-content .mw-editsection, .wiki-content .navbox { display: none !important; }
        .loading-spinner { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen">

    <div id="screen-auth" class="flex items-center justify-center min-h-screen bg-blue-600 p-4">
        <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-sm text-center">
            <h1 class="text-3xl font-black mb-6">The Wiki Game</h1>
            <input type="text" id="auth-user" placeholder="Username" class="w-full p-3 mb-3 border rounded-xl outline-none focus:ring-2 ring-blue-500">
            <input type="password" id="auth-pass" placeholder="Password" class="w-full p-3 mb-6 border rounded-xl outline-none focus:ring-2 ring-blue-500">
            <div class="flex gap-2">
                <button id="btn-login" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold">Login</button>
                <button id="btn-signup" class="flex-1 py-3 bg-gray-100 rounded-xl font-bold">Sign Up</button>
            </div>
            <p id="auth-msg" class="mt-4 text-sm font-bold text-red-500 hidden"></p>
        </div>
    </div>

    <div id="game-ui" class="hidden">
        <div class="fixed top-4 right-4 flex items-center gap-3 z-50">
            <div class="bg-white px-3 py-1.5 rounded-xl shadow-sm border font-black text-gray-700 flex gap-3">
                <span>🔥 <span id="streak-val">0</span></span>
                <span class="border-l pl-3">🪙 <span id="coins-val">0</span></span>
                <button id="btn-logout" class="text-gray-400 ml-2">🚪</button>
            </div>
        </div>

        <div id="screen-menu" class="flex flex-col items-center justify-center min-h-screen p-4">
            <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-lg text-center">
                <p id="welcome-text" class="text-blue-500 font-bold mb-2 uppercase tracking-widest text-xs"></p>
                <h2 id="mode-display" class="text-2xl font-black mb-6 text-blue-600">Classic Mode</h2>
                <div class="bg-blue-50 p-4 rounded-xl border text-left mb-3">
                    <span class="text-xs font-bold text-blue-400">START</span>
                    <div id="solo-start" class="font-bold text-lg">Loading...</div>
                </div>
                <div class="bg-red-50 p-4 rounded-xl border text-left mb-6">
                    <span class="text-xs font-bold text-red-400">TARGET</span>
                    <div id="solo-target" class="font-bold text-lg">Loading...</div>
                </div>
                <div class="flex flex-col gap-3">
                    <button id="btn-roll" class="py-3 bg-gray-100 rounded-xl font-bold">🎲 New Topics (-2 🪙)</button>
                    <button id="btn-start" class="py-3 bg-blue-600 text-white rounded-xl font-bold">🚀 Start Game</button>
                </div>
            </div>
        </div>

        <div id="screen-game" class="hidden flex flex-col min-h-screen bg-white">
            <header class="p-4 border-b sticky top-0 bg-white z-10 flex justify-between items-center">
                <div><span class="text-xs block text-gray-400">TARGET</span><span id="target-display" class="font-bold text-red-600"></span></div>
                <div class="text-center"><span class="text-xs block text-gray-400">CLICKS</span><span id="click-count" class="font-bold text-xl">0</span></div>
                <button id="btn-quit" class="text-sm font-bold text-gray-400">Quit</button>
            </header>
            <main class="p-6 max-w-4xl mx-auto w-full">
                <h1 id="current-title" class="text-3xl font-serif mb-6 border-b pb-2"></h1>
                <div id="wiki-area" class="wiki-content"></div>
                <div id="loader" class="hidden py-20 flex justify-center"><div class="loading-spinner"></div></div>
            </main>
        </div>
    </div>

    <script>
        const state = { user: null, coins: 0, streak: 0, start: '', target: '', clicks: 0, path: [] };

        // --- Auth System ---
        function getAccounts() { return JSON.parse(localStorage.getItem('wiki_accounts') || '{}'); }

        document.getElementById('btn-signup').onclick = () => {
            const user = document.getElementById('auth-user').value.trim();
            const pass = document.getElementById('auth-pass').value.trim();
            if(!user || !pass) return;
            let accounts = getAccounts();
            if(accounts[user]) { showAuthMsg("Name taken!"); return; }
            accounts[user] = { password: pass, coins: 10, streak: 0 };
            localStorage.setItem('wiki_accounts', JSON.stringify(accounts));
            showAuthMsg("Signed up! Now Login.", false);
        };

        document.getElementById('btn-login').onclick = () => {
            const user = document.getElementById('auth-user').value.trim();
            const pass = document.getElementById('auth-pass').value.trim();
            let accounts = getAccounts();
            if(accounts[user] && accounts[user].password === pass) {
                state.user = user;
                state.coins = accounts[user].coins;
                state.streak = accounts[user].streak;
                loginSuccess();
            } else { showAuthMsg("Wrong name or password!"); }
        };

        function loginSuccess() {
            document.getElementById('screen-auth').classList.add('hidden');
            document.getElementById('game-ui').classList.remove('hidden');
            document.getElementById('welcome-text').innerText = `Hello, ${state.user}`;
            updateStats();
            rollTopics();
        }

        function saveGame() {
            let accounts = getAccounts();
            if(!state.user) return;
            accounts[state.user].coins = state.coins;
            accounts[state.user].streak = state.streak;
            localStorage.setItem('wiki_accounts', JSON.stringify(accounts));
            updateStats();
        }

        function showAuthMsg(txt, isErr = true) {
            const el = document.getElementById('auth-msg');
            el.innerText = txt;
            el.className = `mt-4 text-sm font-bold ${isErr ? 'text-red-500' : 'text-green-500'}`;
            el.classList.remove('hidden');
        }

        // --- Game System ---
        const topics = ["Albert Einstein", "Pizza", "Ancient Egypt", "Batman", "Internet", "Coffee", "Mars", "Japan", "Chess", "Dinosaur"];

        function rollTopics() {
            const filtered = topics.sort(() => 0.5 - Math.random());
            state.start = filtered[0];
            state.target = filtered[1];
            document.getElementById('solo-start').innerText = state.start;
            document.getElementById('solo-target').innerText = state.target;
        }

        document.getElementById('btn-roll').onclick = () => {
            if(state.coins >= 2) { state.coins -= 2; rollTopics(); saveGame(); }
            else { alert("Not enough coins!"); }
        };

        function updateStats() {
            document.getElementById('coins-val').innerText = state.coins;
            document.getElementById('streak-val').innerText = state.streak;
        }

        async function loadWiki(title) {
            document.getElementById('loader').classList.remove('hidden');
            document.getElementById('wiki-area').innerHTML = "";
            document.getElementById('current-title').innerText = title;
            try {
                const res = await fetch(`https://en.wikipedia.org/w/api.php?origin=*&action=parse&page=${encodeURIComponent(title)}&prop=text&format=json&redirects=true`);
                const data = await res.json();
                document.getElementById('wiki-area').innerHTML = data.parse.text['*'];
                document.querySelectorAll('#wiki-area a').forEach(a => {
                    const href = a.getAttribute('href');
                    if(href && href.startsWith('/wiki/') && !href.includes(':')) {
                        a.onclick = (e) => { e.preventDefault(); navigate(decodeURIComponent(href.replace('/wiki/', '')).replace(/_/g, ' ')); };
                    } else { a.style.pointerEvents = 'none'; a.style.color = 'black'; }
                });
            } catch(e) { alert("Error loading page."); }
            document.getElementById('loader').classList.add('hidden');
        }

        function navigate(title) {
            state.clicks++;
            document.getElementById('click-count').innerText = state.clicks;
            if(title.toLowerCase() === state.target.toLowerCase()) {
                alert(`Victory in ${state.clicks} clicks! +1 🪙`);
                state.coins += 1;
                state.streak += 1;
                saveGame();
                location.reload();
            } else { loadWiki(title); }
        }

        document.getElementById('btn-start').onclick = () => {
            state.clicks = 0;
            document.getElementById('target-display').innerText = state.target;
            document.getElementById('screen-menu').classList.add('hidden');
            document.getElementById('screen-game').classList.remove('hidden');
            loadWiki(state.start);
        };

        document.getElementById('btn-quit').onclick = () => location.reload();
        document.getElementById('btn-logout').onclick = () => location.reload();
    </script>
</body>
</html>
